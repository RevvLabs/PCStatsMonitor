name: Build & Release

# Fully automatic versioned releases — no manual version bumping.
# The latest v* git tag is the source of truth; every code push to main cuts
# the next PATCH release (v1.1.0 → v1.1.1). Put #minor or #major anywhere in
# the commit message to bump that part instead, or use the manual Run-workflow
# button and pick the bump size. <Version> in Directory.Build.props is only a
# dev-build placeholder — CI overrides it with the computed version, which is
# what the in-app updater compares against release tags.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "installer/**"
      - "build/**"
      - ".github/workflows/release.yml"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version part to bump"
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — tags drive the version

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Test
        run: dotnet test PCStatsMonitor.sln -c Release

      - name: Compute next version
        id: ver
        shell: pwsh
        run: |
          $tags = git tag --list 'v*' |
            ForEach-Object { try { [version]($_.TrimStart('v')) } catch { $null } } |
            Where-Object { $_ } | Sort-Object -Descending
          $cur = if ($tags) { $tags[0] } else { [version]'1.0.0' }

          $bump = '${{ github.event.inputs.bump }}'
          if (-not $bump) { $bump = 'patch' }
          $msg = git log -1 --pretty=%B
          if ($msg -match '#major') { $bump = 'major' }
          elseif ($msg -match '#minor') { $bump = 'minor' }

          $next = switch ($bump) {
            'major' { [version]::new($cur.Major + 1, 0, 0) }
            'minor' { [version]::new($cur.Major, $cur.Minor + 1, 0) }
            default { [version]::new($cur.Major, $cur.Minor, [Math]::Max($cur.Build, 0) + 1) }
          }
          "current $cur -> $bump -> $next"
          "version=$next" >> $env:GITHUB_OUTPUT

      - name: Publish app
        run: dotnet publish src/PCStatsMonitor.App/PCStatsMonitor.App.csproj -c Release -f net10.0-windows -r win-x64 -o publish/win-x64 -p:Version=${{ steps.ver.outputs.version }}

      - name: Compile installer
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.ver.outputs.version }} installer\PCStatsMonitor.iss'

      # Zip of the publish tree — the app's in-place auto-updater downloads this
      # and patches itself silently (Discord-style); the setup exe stays for
      # fresh installs and as the updater's fallback.
      - name: Zip publish tree
        shell: pwsh
        run: Compress-Archive -Path publish/win-x64/* -DestinationPath dist/PCStatsMonitor-${{ steps.ver.outputs.version }}-win-x64.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PCStatsMonitor-Setup-${{ steps.ver.outputs.version }}
          path: |
            dist/*.exe
            dist/*.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: PC Stats Monitor ${{ steps.ver.outputs.version }}
          files: |
            dist/*.exe
            dist/*.zip
          generate_release_notes: true
