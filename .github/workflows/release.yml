name: Build & Release

# Every push to main: build, test, compile the installer, and publish it as a
# GitHub Release tagged from the version in build/Directory.Build.props.
# Bump that version to cut a new release; pushes with an unchanged version
# update the existing release's assets.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Test
        run: dotnet test PCStatsMonitor.sln -c Release

      - name: Publish app
        run: dotnet publish src/PCStatsMonitor.App/PCStatsMonitor.App.csproj -c Release -f net10.0-windows -r win-x64 -o publish/win-x64

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          $v = ([xml](Get-Content build/Directory.Build.props)).Project.PropertyGroup.Version
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Compile installer
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.ver.outputs.version }} installer\PCStatsMonitor.iss'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PCStatsMonitor-Setup-${{ steps.ver.outputs.version }}
          path: dist/*.exe

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: PC Stats Monitor ${{ steps.ver.outputs.version }}
          files: dist/*.exe
          generate_release_notes: true
